[profile.default]
src = "contracts"
test = "test/foundry"
out = "forge-out"
libs = ["node_modules", "lib"]
solc = "0.8.20"
evm_version = "paris"
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@chainlink/=node_modules/@chainlink/"
]

[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x1234"

[invariant]
runs = 256
depth = 50
fail_on_revert = false
