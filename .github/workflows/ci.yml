name: NEXALO CI — Security & Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Compile ──────────────────────────────────────────────────────────
  compile:
    name: Compile Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts/

  # ── Job 2: Security Tests ───────────────────────────────────────────────────
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: artifacts/
      - name: Run Security Test Suite
        run: npx hardhat test test/security.full.test.js --network hardhat
        timeout-minutes: 10
      - name: Run Integration Tests
        run: npx hardhat test test/ecosystem.integration.test.js --network hardhat
        timeout-minutes: 15

  # ── Job 3: Full Test Suite ──────────────────────────────────────────────────
  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: artifacts/
      - name: Run all tests
        run: npx hardhat test --network hardhat
        timeout-minutes: 30

  # ── Job 4: Coverage ─────────────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Run Coverage
        run: npx hardhat coverage
        timeout-minutes: 30
      - name: Check coverage threshold (90%)
        run: |
          COVERAGE=$(cat coverage/lcov.info | grep -o 'DA:[0-9]*,[0-9]*' | awk -F',' 'BEGIN{hit=0;total=0} {total++; if($2>0) hit++} END{printf "%.1f", hit/total*100}')
          echo "Line coverage: $COVERAGE%"
          # Fail if below 90%
          python3 -c "import sys; c=$COVERAGE; sys.exit(1) if c < 90 else print(f'Coverage OK: {c}%')"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── Job 5: Gas Report ───────────────────────────────────────────────────────
  gas-report:
    name: Gas Report
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Gas Report
        env:
          REPORT_GAS: true
        run: npx hardhat test --network hardhat 2>&1 | tee reports/gas-report-ci.txt
        timeout-minutes: 20
      - uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: reports/gas-report-ci.txt

  # ── Job 6: Solhint Linting ──────────────────────────────────────────────────
  lint:
    name: Solhint Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx solhint "contracts/**/*.sol" --ignore-path .solhintignore || true

  # ── Job 7: Static Analysis (Slither) ─────────────────────────────────────────
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Slither
        uses: crytic/slither-action@v0.3.1
        with:
          target: 'contracts/'
          slither-args: '--exclude-dependencies --filter-paths "mocks"'
          fail-on: none # Warn for now, fix before mainnet
